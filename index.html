<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Truck Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Animated road stripes ── */
    #road-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #2d3a1e 60%, #1a2a10 100%);
      z-index: 0;
      overflow: hidden;
    }
    .road-stripe {
      position: absolute;
      left: 50%;
      width: 18px;
      height: 80px;
      background: #ffd700;
      border-radius: 4px;
      transform: translateX(-50%);
      animation: roadMove 1.2s linear infinite;
      opacity: 0.85;
    }
    @keyframes roadMove {
      from { transform: translateX(-50%) translateY(-100px); }
      to   { transform: translateX(-50%) translateY(110vh); }
    }

    /* ── Main card ── */
    #main-card {
      position: relative;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      border: 2px solid #ffd700;
      border-radius: 22px;
      padding: 28px 24px 24px 24px;
      max-width: 420px;
      width: 92vw;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,0.18), 0 8px 40px rgba(0,0,0,0.7);
    }

    #truck-emoji {
      font-size: 62px;
      display: block;
      margin-bottom: 8px;
      animation: truckBounce 2.4s ease-in-out infinite;
    }
    @keyframes truckBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    #game-title {
      font-size: 28px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5), 2px 2px #000;
      letter-spacing: 2px;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    #game-subtitle {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── App buttons ── */
    .app-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: linear-gradient(135deg, rgba(255,215,0,0.10), rgba(255,215,0,0.03));
      border: 2px solid #ffd700;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      text-decoration: none;
      color: white;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      touch-action: manipulation;
    }
    .app-btn:active {
      transform: scale(0.97);
      background: rgba(255,215,0,0.22);
      box-shadow: 0 0 20px rgba(255,215,0,0.35);
    }
    .app-icon {
      font-size: 30px;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }
    .app-info { text-align: left; flex: 1; }
    .app-name {
      font-size: 15px;
      font-weight: 800;
      color: #ffd700;
      letter-spacing: 0.5px;
    }
    .app-desc {
      font-size: 11px;
      color: #bbb;
      margin-top: 2px;
      line-height: 1.3;
    }
    .app-arrow {
      font-size: 18px;
      color: #ffd700;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #444, transparent);
      margin: 14px 0 12px 0;
    }

    #footer-info {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
    }
    #footer-info span { color: #888; }

    #version {
      position: fixed;
      bottom: 10px;
      right: 12px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      z-index: 20;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Animated road background -->
  <div id="road-bg">
    <div class="road-stripe" style="animation-delay: 0.0s;"></div>
    <div class="road-stripe" style="animation-delay: 0.2s;"></div>
    <div class="road-stripe" style="animation-delay: 0.4s;"></div>
    <div class="road-stripe" style="animation-delay: 0.6s;"></div>
    <div class="road-stripe" style="animation-delay: 0.8s;"></div>
    <div class="road-stripe" style="animation-delay: 1.0s;"></div>
  </div>

  <!-- Main card -->
  <div id="main-card">
    <span id="truck-emoji">🚛</span>
    <div id="game-title">MY TRUCK SIMULATOR</div>
    <div id="game-subtitle">CDL Driver Training App</div>

    <!-- 1. Air Brakes -->
    <a class="app-btn" href="airbrake.html">
      <div class="app-icon">🛑</div>
      <div class="app-info">
        <div class="app-name">AIR BRAKES</div>
        <div class="app-desc">Air brake system training & testing</div>
      </div>
      <div class="app-arrow">▶</div>
    </a>

    <!-- 2. Components Test -->
    <a class="app-btn" href="componants_test.html">
      <div class="app-icon">🔧</div>
      <div class="app-info">
        <div class="app-name">COMPONENTS TEST</div>
        <div class="app-desc">Identify & test truck components</div>
      </div>
      <div class="app-arrow">▶</div>
    </a>

    <!-- 3. Pre-Trip Inspection -->
    <a class="app-btn" href="pretrip.html">
      <div class="app-icon">📋</div>
      <div class="app-info">
        <div class="app-name">PRE-TRIP INSPECTION</div>
        <div class="app-desc">Full CDL pre-trip checklist walkthrough</div>
      </div>
      <div class="app-arrow">▶</div>
    </a>

    <!-- 4. Drive -->
    <a class="app-btn" href="drive.html">
      <div class="app-icon">🚛</div>
      <div class="app-info">
        <div class="app-name">DRIVE</div>
        <div class="app-desc">Road skills & driving simulation</div>
      </div>
      <div class="app-arrow">▶</div>
    </a>

    <div class="divider"></div>
    <div id="footer-info">SELECT A MODULE TO BEGIN &nbsp;|&nbsp; <span>gamache61</span></div>
  </div>

  <div id="version">v1.0</div>

</body>
</html>
